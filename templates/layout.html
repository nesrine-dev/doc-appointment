<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocAppointment | Trusted Healthcare</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Medical Frosted Glass Effect */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6); /* Deep slate transparent */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        main { flex: 1; }
    </style>
</head>

<body class="antialiased relative">

    <video autoplay loop muted playsinline class="fixed inset-0 w-full h-full object-cover z-[-2]">
        <source src="{{ url_for('static', filename='Doctor_Video_Creation_Request.mp4') }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="fixed inset-0 bg-gradient-to-br from-[#020617]/95 via-[#0f172a]/85 to-[#0d9488]/40 z-[-1]"></div>

    <nav class="w-full border-b border-white/10 glass-panel sticky top-0 z-50">
        <div class="max-w-[1200px] mx-auto flex justify-between items-center py-4 px-6">
            <a href="{{ url_for('index') }}" class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                <i class="fa-solid fa-heart-pulse text-teal-400"></i>
                Doc<span class="text-teal-400">Appointment</span>
            </a>
            <div class="hidden sm:flex space-x-8 text-sm font-medium text-slate-300">
                <a href="{{ url_for('index') }}" class="hover:text-white transition">Home</a>
                <a href="{{ url_for('doctors') }}" class="hover:text-white transition">Doctors</a>
                <a href="{{ url_for('appointment') }}" class="hover:text-white transition">Appointment</a>
                <a href="{{ url_for('register') }}" class="hover:text-white transition">Register</a>
            </div>
        </div>
    </nav>

    <main class="w-full flex flex-col items-center pt-12 pb-16 relative z-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="w-full border-t border-white/10 glass-panel py-6 mt-auto relative z-10">
        <div class="max-w-[1200px] mx-auto px-6 text-center text-slate-400 text-sm">
            <p>DocAppointment &copy; 2026 | Your Health, Our Priority</p>
        </div>
    </footer>

</body>
</html>
