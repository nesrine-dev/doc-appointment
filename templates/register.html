<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | DocAppointment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: white; 
            color: #212529; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            margin: 0; 
        }
        .header-footer-bg { 
            background-color: #212529; 
            color: white; 
        }
        .form-input { 
            width: 100%; 
            border: 1px solid #ced4da; 
            border-radius: 0.375rem; 
            padding: 0.6rem 0.75rem; 
            color: #495057; 
            outline: none; 
            transition: border-color 0.15s ease-in-out; 
            margin-bottom: 1rem;
        }
        .form-input:focus { 
            border-color: #86b7fe; 
            box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25); 
        }
        .btn-success { 
            background-color: #198754; 
            color: white; 
            padding: 0.5rem 1.5rem; 
            border-radius: 0.375rem; 
            font-weight: 500; 
            border: 1px solid #198754; 
            transition: 0.2s; 
            cursor: pointer;
        }
        .btn-success:hover { 
            background-color: #157347; 
        }
    </style>
</head>
<body>

    <nav class="header-footer-bg px-6 py-4 flex justify-between items-center">
        <a href="{{ url_for('index') }}" class="text-xl font-bold text-white no-underline">DocAppointment</a>
        <div class="space-x-4 text-sm font-medium">
            <a href="{{ url_for('index') }}" class="text-white no-underline hover:text-gray-300">Home</a>
            <a href="{{ url_for('doctors') }}" class="text-white no-underline hover:text-gray-300">Doctors</a>
            <a href="{{ url_for('appointment') }}" class="text-white no-underline hover:text-gray-300">Appointment</a>
            <a href="{{ url_for('register') }}" class="text-white no-underline hover:text-gray-300">Register</a>
        </div>
    </nav>

    <main class="flex-grow flex justify-center items-start pt-16 pb-12">
        <div class="w-full max-w-4xl px-4">
            <h2 class="text-center text-3xl font-semibold mb-8 text-gray-800">Register</h2>
            
            <form method="POST" action="/register">
                <input type="text" name="name" class="form-input" placeholder="Name" required>
                
                <input type="email" name="email" class="form-input" placeholder="Email" required>
                
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <input type="tel" name="phone" class="form-input" placeholder="Phone Number" required>
                    </div>
                    <div class="w-1/2">
                        <input type="date" name="dob" class="form-input text-gray-500" required>
                    </div>
                </div>

                <select name="gender" class="form-input text-gray-500" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>

                <input type="password" name="password" class="form-input" placeholder="Password" required>

                <div class="pt-2">
                    <button type="submit" class="btn-success">Register</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="header-footer-bg py-6 text-center text-sm">
        DocAppointment &copy; 2026 | Medical Booking Platform
    </footer>

</body>
</html>
