<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | DocAppointment</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
}

/* VIDEO BACKGROUND */
.video-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(5, 10, 20, 0.75);
    z-index: -1;
}

/* NAV */
.header-footer-bg {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(10px);
}

/* GLASS CARD */
.glass-card {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(25px);
    border-radius: 20px;
    padding: 40px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* INPUT */
.form-input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.05);
    color: white;
    margin-bottom: 15px;
    transition: 0.3s;
}

.form-input::placeholder {
    color: #9ca3af;
}

.form-input:hover {
    background: rgba(255,255,255,0.08);
}

.form-input:focus {
    outline: none;
    border-color: #06b6d4;
    box-shadow: 0 0 0 2px rgba(6,182,212,0.3);
}
.text-gradient {
    background: linear-gradient(to right, #3b82f6, #14b8a6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* BUTTON */
.btn-modern {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #06b6d4, #2563eb);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn-modern:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(37,99,235,0.4);
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay loop muted playsinline class="video-bg">
    <source src="{{ url_for('static', filename='Doctor_Video_Creation_Request.mp4') }}" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- NAVBAR -->
<nav class="header-footer-bg px-6 py-4 flex justify-between items-center">
     <div class="flex items-center gap-2 text-2xl font-bold">

        <i class="fa-solid fa-heart-pulse bg-gradient-to-r from-blue-400 to-teal-400 text-transparent bg-clip-text"></i>

        <span class="text-white">
            Doc<span class="text-gradient">Appointment</span>
        </span>
    </div>
    <div class="space-x-4 text-sm font-medium">
        <a href="{{ url_for('index') }}" class="hover:text-cyan-400">Home</a>
        <a href="{{ url_for('doctors') }}" class="hover:text-cyan-400">Doctors</a>
        <a href="{{ url_for('appointment') }}" class="hover:text-cyan-400">Appointment</a>
        <a href="{{ url_for('register') }}" class="text-cyan-400">Register</a>
    </div>
</nav>

<!-- MAIN -->
<main class="flex justify-center items-center min-h-[80vh] px-4">

    <div class="w-full max-w-xl glass-card">

        <h2 class="text-center text-3xl font-bold mb-3">Create Account</h2>
        <p class="text-center text-gray-400 mb-6">Book appointments easily</p>

        <form method="POST" action="/register">

            <input type="text" name="name" class="form-input" placeholder="Full Name" required>

            <input type="email" name="email" class="form-input" placeholder="Email Address" required>

            <div class="flex gap-3">
                <input type="tel" name="phone" class="form-input w-1/2" placeholder="Phone Number" required>
                <input type="date" name="dob" class="form-input w-1/2" required>
            </div>

            <select name="gender" class="form-input" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <input type="password" name="password" class="form-input" placeholder="Password" required>

            <button type="submit" class="btn-modern mt-2">Register</button>

        </form>
    </div>

</main>

<!-- FOOTER -->
<footer class="header-footer-bg py-6 text-center text-sm text-gray-400">
    DocAppointment © 2026 | Medical Booking Platform
</footer>

</body>
</html>
