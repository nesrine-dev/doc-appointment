<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule | DocAppointment</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #020617;
    color: white;
    overflow-x: hidden;
}

/* glow background */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 20% 30%, rgba(6,182,212,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(37,99,235,0.15), transparent 40%);
    z-index: -1;
}

/* dots grid */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: -1;
}

/* glass cards */
.glass {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 40px rgba(0,255,255,0.08);
    transition: 0.3s;
}

.glass:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 60px rgba(0,255,255,0.15);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-10 py-4 bg-white/5 backdrop-blur">

    <div class="flex items-center gap-2">
        <i class="fa-solid fa-heart-pulse text-cyan-400 text-xl"></i>
        <span class="text-xl font-semibold">
            Doc<span class="text-cyan-400">Appointment</span>
        </span>
    </div>

    <div class="space-x-6 text-sm">
        <a href="/" class="hover:text-cyan-400">Home</a>
        <a href="/doctors" class="hover:text-cyan-400">Doctors</a>
        <a href="/appointment" class="hover:text-cyan-400">Appointment</a>
        <a href="/contact" class="hover:text-cyan-400">Contact</a>
    </div>

</nav>

<!-- MAIN -->
<section class="relative min-h-screen px-6 pt-20 pb-16">

    <!-- glow overlay -->
    <div class="absolute inset-0 -z-10 blur-3xl opacity-40
        bg-gradient-to-br from-cyan-500/10 via-blue-500/5 to-transparent">
    </div>

    <!-- TITLE -->
    <div class="max-w-5xl mx-auto text-center mb-16 mt-4">

        <h1 class="text-4xl md:text-5xl font-bold mb-4">
            Clinic <span class="text-cyan-400">Schedule</span>
        </h1>

        <p class="text-gray-400">
            Check our working hours and available medical services
        </p>

    </div>

    <!-- CONTENT GRID -->
    <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-10">

        <!-- WORKING HOURS -->
        <div class="glass p-8">

            <div class="flex items-center gap-3 mb-6">
                <i class="fa-solid fa-clock text-cyan-400 text-xl"></i>
                <h2 class="text-xl font-semibold">Working Hours</h2>
            </div>

            <div class="space-y-4 text-gray-300">

                <div class="flex justify-between">
                    <span>Monday - Friday</span>
                    <span class="text-cyan-400">08:00 - 18:00</span>
                </div>

                <div class="flex justify-between">
                    <span>Saturday</span>
                    <span class="text-cyan-400">09:00 - 14:00</span>
                </div>

                <div class="flex justify-between">
                    <span>Sunday</span>
                    <span class="text-red-400">Closed</span>
                </div>

            </div>

        </div>

        <!-- SERVICES -->
        <div class="glass p-8">

            <div class="flex items-center gap-3 mb-6">
                <i class="fa-solid fa-stethoscope text-cyan-400 text-xl"></i>
                <h2 class="text-xl font-semibold">Services</h2>
            </div>

            <div class="space-y-4">

                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-check text-green-400"></i>
                    <span>General Consultation</span>
                </div>

                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-check text-green-400"></i>
                    <span>Cardiology</span>
                </div>

                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-check text-green-400"></i>
                    <span>Dermatology</span>
                </div>

                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-check text-green-400"></i>
                    <span>Neurology</span>
                </div>

            </div>

        </div>

    </div>

    <!-- BUTTON -->
    <div class="text-center mt-14">

        <a href="/appointment"
           class="px-10 py-3 rounded-lg bg-gradient-to-r from-cyan-500 to-blue-500 font-semibold shadow-lg hover:opacity-90 transition">

            Book Appointment

        </a>

    </div>

</section>

</body>
</html>
