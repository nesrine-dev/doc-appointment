<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocAppointment | Book Appointment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1120;
            color: #e2e8f0;
            background-image: radial-gradient(circle at 15% 50%, rgba(20, 184, 166, 0.08), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 25%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .particles-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.2;
            pointer-events: none;
            background-image: radial-gradient(#3b82f6 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
        }

        .text-gradient {
            background: linear-gradient(to right, #3b82f6, #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Custom Form Styling for Dark Mode --- */
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1; /* Light gray text */
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6; /* Blue glow on click */
            background: rgba(59, 130, 246, 0.1);
        }

        /* Fix the dropdown options text color for dark mode */
        select.form-control option {
            background-color: #0b1120;
            color: #e2e8f0;
        }

        /* Makes the little calendar and clock icons white */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #14b8a6);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }
        
        /* A subtle back link to return to the main menu */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body>

    <div class="particles-bg"></div>

    <div class="glass-panel mx-4">
        <h1 class="text-3xl font-bold mb-8 text-center">
            <span class="text-gradient">Book Appointment</span>
        </h1>
        
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="patient_id">Patient ID</label>
                <input type="text" id="patient_id" name="patient_id" class="form-control" placeholder="Enter your ID">
            </div>

            <div class="form-group">
                <label for="doctor">Doctor</label>
                <select id="doctor" name="doctor" class="form-control">
                    <option value="">Select a Doctor</option>
                    <option value="dr_ahmet">Dr. Ahmet Yılmaz</option>
                    <option value="dr_elif">Dr. Elif Kaya</option>
                    <option value="dr_can">Dr. Can Demir</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" class="form-control">
            </div>

            <div class="form-group">
                <label for="time">Time</label>
                <input type="time" id="time" name="time" class="form-control">
            </div>

            <button type="submit" class="submit-btn">Book Appointment</button>
        </form>
        
        <a href="{{ url_for('index') }}" class="back-link">← Back to Menu</a>
    </div>

</body>
</html>
