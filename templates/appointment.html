<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocAppointment | Book Appointment</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
    }

    /* VIDEO BACKGROUND */
    .video-bg {
        position: fixed;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
    }

    /* DARK OVERLAY */
    .overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(5, 10, 20, 0.85); /* Slightly darker to match your screenshot */
        z-index: -1;
    }

    /* GLASS PANEL - Matched to your Register design */
    .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(16px);
        border-radius: 24px;
        padding: 40px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 550px;
    }

    /* FORM INPUTS */
    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: none; /* Hidden to match the clean look of your register screenshot, using placeholders instead */
    }

    .form-control {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #e2e8f0;
        padding: 16px 20px;
        border-radius: 12px;
        font-size: 15px;
        transition: 0.3s;
    }

    .form-control:hover {
        background: rgba(255, 255, 255, 0.06);
    }

    .form-control:focus {
        outline: none;
        border-color: #3b82f6;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    select.form-control {
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 1rem center;
        background-repeat: no-repeat;
        background-size: 1.5em 1.5em;
    }

    select.form-control option {
        background: #0f172a;
        color: #e2e8f0;
    }

    /* DATE & TIME ICON */
    ::-webkit-calendar-picker-indicator {
        filter: invert(1);
        opacity: 0.5;
        cursor: pointer;
    }
    ::-webkit-calendar-picker-indicator:hover {
        opacity: 0.8;
    }

    /* BUTTON */
    .submit-btn {
        width: 100%;
        background: linear-gradient(to right, #06b6d4, #3b82f6);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }
</style>
</head>

<body>

<video autoplay loop muted playsinline class="video-bg">
    <source src="{{ url_for('static', filename='Doctor_Video_Creation_Request.mp4') }}" type="video/mp4">
</video>

<div class="overlay"></div>

<nav class="fixed top-0 left-0 w-full z-50 px-8 py-5 flex justify-between items-center bg-[#0f172a]/90 backdrop-blur-md border-b border-white/5">
    <a href="{{ url_for('index') }}" class="flex items-center gap-2 text-2xl font-bold text-white transition-transform hover:scale-105">
        <i class="fa-solid fa-heart-pulse text-3xl bg-gradient-to-r from-blue-500 to-teal-400 text-transparent bg-clip-text"></i>
        <span>
            Doc<span class="bg-gradient-to-r from-blue-500 to-teal-400 text-transparent bg-clip-text">Appointment</span>
        </span>
    </a>

    <div class="hidden sm:block space-x-8 text-sm font-medium text-gray-300">
        <a href="{{ url_for('index') }}" class="hover:text-cyan-400 transition">Home</a>
        <a href="{{ url_for('doctors') }}" class="hover:text-cyan-400 transition">Doctors</a>
        <a href="{{ url_for('appointment') }}" class="text-cyan-400 font-bold">Appointment</a>
        <a href="{{ url_for('register') }}" class="hover:text-cyan-400 transition">Register</a>
    </div>
</nav>

<main class="flex-grow flex justify-center items-center px-4 pt-32 pb-10">

    <div class="glass-panel">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Book Appointment</h1>
            <p class="text-sm text-gray-400">Book appointments easily</p>
        </div>

        <form action="{{ url_for('appointment') }}" method="POST">

            <div class="form-group">
                <select name="doctor" class="form-control" required>
                    <option value="" disabled selected>Select a Doctor</option>
                    {% for doc in doctors %}
                    <option value="{{ doc.id }}">Dr. {{ doc.user.name }} — {{ doc.specialty }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex gap-4">
                <div class="form-group w-1/2">
                    <input type="date" name="date" class="form-control" required>
                </div>

                <div class="form-group w-1/2">
                    <input type="time" name="time" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                Book Appointment
            </button>

        </form>

    </div>

</main>

<footer class="w-full text-center py-6 text-sm text-gray-400 relative z-10 bg-[#0f172a]/50 backdrop-blur-sm border-t border-white/5">
    DocAppointment &copy; 2026 | Medical Booking Platform
</footer>

</body>
</html>
